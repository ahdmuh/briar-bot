name: Characters · Sync

on:
  workflow_dispatch:
    inputs:
      character_name:
        description: Full Epic Seven character name
        required: true
        type: string
      aliases:
        description: Optional aliases or abbreviations, separated by commas or new lines
        required: false
        type: string
      target_branch:
        description: Branch to update
        required: true
        default: main
        type: string

permissions:
  contents: write
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      target_branch: ${{ inputs.target_branch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update character data
        env:
          CHARACTER_NAME: ${{ inputs.character_name }}
          CHARACTER_ALIASES: ${{ inputs.aliases }}
        run: bun scripts/upsert_character_data.js --character "$CHARACTER_NAME" --aliases "$CHARACTER_ALIASES"

      - name: Validate character data
        run: bun run test:character-data

      - name: Commit changes
        id: commit
        env:
          CHARACTER_NAME: ${{ inputs.character_name }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          if git diff --quiet; then
            echo "No character data changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/character-names.json data/character-aliases.json
          git commit -m "chore(data): update ${CHARACTER_NAME}"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    needs: sync
    if: ${{ needs.sync.outputs.changed == 'true' && needs.sync.outputs.target_branch == 'main' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/briar-image.yml
    with:
      ref: ${{ needs.sync.outputs.commit_sha }}
